services:
  # ── Backend API (Node.js) ──────────────────────────────────────────
  - type: web
    name: strategyos-api
    runtime: node
    region: oregon
    plan: starter           # $7/mo — needed for persistent disk
    rootDir: .
    buildCommand: >
      npm install &&
      npm run build -w core &&
      npx prisma generate --schema=backend/prisma/schema.prisma &&
      npx prisma migrate deploy --schema=backend/prisma/schema.prisma &&
      npm run build -w backend
    startCommand: node backend/dist/index.js
    disk:
      name: strategyos-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: 10000
      - key: DATABASE_URL
        value: file:/data/prod.db   # persistent disk — survives redeploys
      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure secret
      - key: ANTHROPIC_API_KEY
        sync: false                  # set manually in Render dashboard
    healthCheckPath: /api/health

  # ── Frontend (Static Site) ─────────────────────────────────────────
  - type: web
    name: strategyos-app
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://strategyos-api.onrender.com   # update after first deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html    # SPA fallback
