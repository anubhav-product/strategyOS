services:
  # ── Backend API (Node.js) ──────────────────────────────────────────
  - type: web
    name: strategyos-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: >
      npm install &&
      npm run build -w core &&
      npx prisma generate --schema=backend/prisma/schema.prisma &&
      npx prisma db push --schema=backend/prisma/schema.prisma &&
      npm run build -w backend
    startCommand: node backend/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: strategyos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /api/health

  # ── Frontend (Static Site) ─────────────────────────────────────────
  - type: web
    name: strategyos-app
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: strategyos-db
    databaseName: strategyos
    plan: free
